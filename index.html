<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuickSight Custom Visual - Kaplan Meier</title>
  <style>
    :root {
      --color-primary: #2E2A78;
      --color-secondary-analytic: #343087;
      --color-success: #3FAE9F;
      --color-warning: #F57C00;
      --color-danger: #E07BAA;
      --color-neutral: #9A978B;
      --color-bg: #E9E4DC;
      --color-grid: #D8D2C8;
      --color-text-secondary: #6E6E6E;
      --color-panel: #FFFFFF;
      --ui-font: "Amazon Ember", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--color-bg);
      color: var(--color-text-secondary);
      font-family: var(--ui-font);
    }

    body {
      display: flex;
      min-height: 100vh;
    }

    .app {
      flex: 1;
      min-width: 0;
      min-height: 0;
      padding: clamp(6px, 1vw, 14px);
      display: flex;
    }

    .panel {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--color-panel);
      border: 1px solid var(--color-grid);
      border-radius: 4px;
      padding: 8px 10px 10px;
      gap: 6px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 24px;
    }

    .title {
      margin: 0;
      color: var(--color-primary);
      font-size: clamp(0.86rem, 1.1vw, 1.02rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .canvas-wrap {
      flex: 0 0 auto;
      width: 100%;
      position: relative;
      height: clamp(250px, 52vh, 480px);
      border: 1px solid var(--color-grid);
      padding: 4px 2px 2px;
      background: var(--color-panel);
    }

    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      margin-top: 2px;
    }

    .kpi-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border-top: 1px solid var(--color-grid);
      padding-top: 3px;
    }

    .kpi-label {
      color: var(--color-text-secondary);
      font-size: 0.66rem;
      font-weight: 600;
      line-height: 1.1;
      text-transform: none;
    }

    .kpi-value {
      color: var(--color-primary);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.1;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .risk-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--color-grid);
      padding-top: 4px;
    }

    .risk-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.69rem;
      color: var(--color-text-secondary);
      table-layout: fixed;
    }

    .risk-table th,
    .risk-table td {
      border: 1px solid var(--color-grid);
      padding: 2px 4px;
      text-align: center;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .risk-table thead th {
      background: var(--color-bg);
      font-weight: 700;
      color: var(--color-primary);
    }

    .risk-table .row-label {
      text-align: left;
      font-weight: 700;
      background: var(--color-bg);
      color: var(--color-primary);
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .chart-error {
      margin: 0;
      color: var(--color-danger);
      font-size: 0.95rem;
      text-align: center;
      padding: 4px;
      display: none;
    }

    @media (max-width: 980px) {
      .kpi-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .kpi-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .canvas-wrap {
        height: clamp(220px, 48vh, 380px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="panel-head">
        <h1 class="title">CURVA DE KAPLAN-MEIER</h1>
      </header>
      <div class="canvas-wrap">
        <canvas id="kmChart" aria-label="Curva Kaplan Meier" role="img"></canvas>
      </div>
      <section class="kpi-strip" aria-label="Metricas Kaplan Meier">

        <article class="kpi-item">

      <p id="chartError" class="chart-error"></p>
    </section>
  </main>

  <script id="kaplan-meier-python-embedded" type="text/python">
import json


def _to_float(value, default=None):
    if value is None:
        return default
    if isinstance(value, (int, float)):
        return float(value)
    text = str(value).strip()
    if not text:
        return default
    text = text.replace(" ", "")
    if text.count(",") > 0 and text.count(".") > 0:
        if text.rfind(",") > text.rfind("."):
            text = text.replace(".", "").replace(",", ".")
        else:
            text = text.replace(",", "")
    elif "," in text:
        text = text.replace(",", ".")
    try:
        return float(text)
    except Exception:
        return default


def _to_event(value):
    parsed = _to_float(value, 0.0)
    return 1 if parsed and parsed > 0 else 0


def _clean_row(raw, idx):
    cic = str(
        raw.get("cic")
        or raw.get("CIC")
        or raw.get("codigopaciente")
        or raw.get("CODIGOPACIENTE")
        or ("p" + str(idx + 1))
    ).strip() or ("p" + str(idx + 1))
    meses_raw = (
        raw.get("meses")
        if "meses" in raw
        else raw.get("mesessupervivencia")
        or raw.get("meses_supervivencia")
        or raw.get("MESES_SUPERVIVENCIA")
    )
    evento_raw = (
        raw.get("evento")
        if "evento" in raw
        else raw.get("exituscorte")
        or raw.get("exitus_corte")
        or raw.get("EXITUS_CORTE")
    )
    meses = _to_float(meses_raw, None)
    if meses is None or meses < 0:
        return None
    return {"cic": cic, "meses": meses, "evento": _to_event(evento_raw)}


def _collapse_patients(rows):
    grouped = {}
    for i, row in enumerate(rows):
        current = _clean_row(row, i)
        if current is None:
            continue
        key = current["cic"]
        if key not in grouped:
            grouped[key] = current
            continue
        if current["meses"] > grouped[key]["meses"]:
            grouped[key]["meses"] = current["meses"]
        if current["evento"] > grouped[key]["evento"]:
            grouped[key]["evento"] = current["evento"]
    return list(grouped.values())


def _survival_at(points, month):
    value = 1.0
    for point in points:
        if point["x"] <= month:
            value = point["y"]
        else:
            break
    return value


def _median(points):
    for point in points:
        if point["y"] <= 0.5:
            return point["x"]
    return None


def _build_risk_table(points, timeline, total_patients, patients):
    max_observed = 0.0
    for point in points:
        if point["x"] > max_observed:
            max_observed = point["x"]
    max_month = max(60, int(((max_observed + 5) // 6) * 6))
    ticks = list(range(0, max_month + 1, 6))

    at_risk = []
    events = []
    censored = []
    survival = []

    if patients:
        for tick in ticks:
            tick_end = tick + 6
            at_risk_count = 0
            events_count = 0
            censored_count = 0
            for row in patients:
                meses = row.get("meses")
                if meses is None:
                    continue
                if meses >= tick:
                    at_risk_count += 1
                if meses >= tick and meses < tick_end:
                    if row.get("evento", 0) == 1:
                        events_count += 1
                    else:
                        censored_count += 1
            at_risk.append(at_risk_count)
            events.append(events_count)
            censored.append(censored_count)
            survival.append(_survival_at(points, tick))
    else:
        for tick in ticks:
            state = {
                "atRisk": total_patients,
                "events": 0,
                "censored": 0,
                "survival": _survival_at(points, tick)
            }
            for item in timeline:
                if item["time"] <= tick:
                    state["atRisk"] = item["atRisk"]
                    state["events"] = item["eventsCum"]
                    state["censored"] = item["censoredCum"]
                    state["survival"] = item["survival"]
                else:
                    break
            at_risk.append(state["atRisk"])
            events.append(state["events"])
            censored.append(state["censored"])
            survival.append(state["survival"])

    return {
        "ticks": ticks,
        "atRisk": at_risk,
        "events": events,
        "censored": censored,
        "survival": survival
    }


def _compute_from_patients(patients):
    if not patients:
        return None
    by_time = {}
    total_events = 0
    total_censored = 0
    for row in patients:
        time = row["meses"]
        key = str(time)
        if key not in by_time:
            by_time[key] = {"time": time, "events": 0, "censored": 0}
        if row["evento"] == 1:
            by_time[key]["events"] += 1
            total_events += 1
        else:
            by_time[key]["censored"] += 1
            total_censored += 1

    ordered_times = sorted([item["time"] for item in by_time.values()])
    n_at_risk = len(patients)
    surv = 1.0
    points = [{"x": 0.0, "y": 1.0}]
    timeline = []
    cumulative_events = 0
    cumulative_censored = 0

    for time in ordered_times:
        bucket = by_time[str(time)]
        d_t = bucket["events"]
        c_t = bucket["censored"]
        at_risk_before = n_at_risk
        cumulative_events += d_t
        cumulative_censored += c_t
        if n_at_risk > 0 and d_t > 0:
            surv = surv * (1.0 - d_t / n_at_risk)
        points.append({"x": float(time), "y": float(surv)})
        timeline.append({
            "time": float(time),
            "atRisk": int(at_risk_before),
            "eventsCum": int(cumulative_events),
            "censoredCum": int(cumulative_censored),
            "survival": float(surv)
        })
        n_at_risk -= (d_t + c_t)
        if n_at_risk < 0:
            n_at_risk = 0

    risk = _build_risk_table(points, timeline, len(patients), patients)
    return {
        "points": points,
        "timeline": timeline,
        "risk": risk,
        "totalPatients": len(patients),
        "totalEvents": total_events,
        "totalCensored": total_censored,
        "median": _median(points),
        "surv12": _survival_at(points, 12),
        "surv24": _survival_at(points, 24)
    }


def _from_precomputed(precomputed):
    points = precomputed.get("points", []) if isinstance(precomputed, dict) else []
    clean_points = []
    for pair in points:
        x = _to_float(pair.get("x") if isinstance(pair, dict) else None, None)
        y = _to_float(pair.get("y") if isinstance(pair, dict) else None, None)
        if x is None or y is None or x < 0:
            continue
        if y < 0:
            y = 0
        if y > 1:
            y = 1
        clean_points.append({"x": x, "y": y})
    clean_points.sort(key=lambda p: p["x"])
    if not clean_points:
        clean_points = [{"x": 0.0, "y": 1.0}, {"x": 30.0, "y": 0.49}]
    elif clean_points[0]["x"] > 0:
        clean_points.insert(0, {"x": 0.0, "y": 1.0})

    total_patients = int(_to_float(precomputed.get("totalPatients"), 0)) if isinstance(precomputed, dict) else 0
    total_events = int(_to_float(precomputed.get("totalEvents"), 0)) if isinstance(precomputed, dict) else 0
    total_censored = int(_to_float(precomputed.get("totalCensored"), 0)) if isinstance(precomputed, dict) else 0
    if total_censored <= 0:
        total_censored = max(0, total_patients - total_events)
    risk = _build_risk_table(clean_points, [], total_patients, [])
    return {
        "points": clean_points,
        "timeline": [],
        "risk": risk,
        "totalPatients": total_patients,
        "totalEvents": total_events,
        "totalCensored": total_censored,
        "median": _median(clean_points),
        "surv12": _survival_at(clean_points, 12),
        "surv24": _survival_at(clean_points, 24)
    }


def compute_km_visual(raw_rows, precomputed):
    rows = raw_rows if isinstance(raw_rows, list) else []
    patients = _collapse_patients(rows)
    if patients:
        return _compute_from_patients(patients)
    return _from_precomputed(precomputed if isinstance(precomputed, dict) else {})


def compute_km_visual_json(raw_rows, precomputed):
    return json.dumps(compute_km_visual(raw_rows, precomputed))
  </script>

  <script>
    /*
      Flujo actual:
      - El bloque Python embebido (type="text/python") define el calculo KM.
      - JS carga Pyodide y ejecuta ese Python para obtener points/risk/metricas.
      - Chart.js solo renderiza.
    */
    (function () {
      "use strict";

      var DEFAULT_CURVE = {
        points: [
          { x: 0, y: 1 },
          { x: 6, y: 0.93 },
          { x: 12, y: 0.82 },
          { x: 18, y: 0.7 },
          { x: 24, y: 0.58 },
          { x: 30, y: 0.49 }
        ],
        totalPatients: 0,
        totalEvents: 0,
        totalCensored: 0,
        median: 30
      };

      var chartInstance = null;
      var pluginRegistered = false;
      var pyodideInstance = null;
      var pyodideBootPromise = null;
      var pythonKernelReady = false;

      var dom = {
        canvas: document.getElementById("kmChart"),
        error: document.getElementById("chartError"),
        pacientes: document.getElementById("metaPacientes"),
        eventos: document.getElementById("metaEventos"),
        mediana: document.getElementById("metaMediana"),
        surv12: document.getElementById("metaSurv12"),
        surv24: document.getElementById("metaSurv24"),
        riskTable: document.getElementById("riskTable")
      };

      // URL parameter parsing from window.location.search.
      function readQueryParams() {
        return new URLSearchParams(window.location.search);
      }

      // Demo filters accepted directly from QuickSight URL params:
      // sexo (All/M/F), edadmin (min), edadmax (max).

      function normalizeText(input, fallback) {
        if (input === null || input === undefined) {
          return fallback;
        }
        var value = String(input).replace(/\s+/g, " ").trim();
        return value || fallback;
      }

      // Numeric validation:
      // accepts only safe numeric strings and returns fallback for invalid values.
      function toSafeNumber(input, fallback) {
        if (input === null || input === undefined) {
          return fallback;
        }

        var raw = String(input).trim();
        if (!raw) {
          return fallback;
        }

        var compact = raw.replace(/\s+/g, "");
        if (!/^[+-]?[\d.,]+$/.test(compact)) {
          return fallback;
        }

        var normalized = compact;
        var lastComma = normalized.lastIndexOf(",");
        var lastDot = normalized.lastIndexOf(".");

        if (lastComma > -1 && lastDot > -1) {
          if (lastComma > lastDot) {
            normalized = normalized.replace(/\./g, "").replace(",", ".");
          } else {
            normalized = normalized.replace(/,/g, "");
          }
        } else if (lastComma > -1) {
          normalized = normalized.replace(",", ".");
        }

        var parsed = Number(normalized);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function getFirstParamValue(params, keys) {
        var keyList = Array.isArray(keys) ? keys : [keys];
        for (var i = 0; i < keyList.length; i += 1) {
          if (params.has(keyList[i])) {
            return params.get(keyList[i]);
          }
        }
        return null;
      }

      function parseList(raw) {
        if (raw === null || raw === undefined) {
          return [];
        }

        var text = String(raw).trim();
        if (!text) {
          return [];
        }

        try {
          var parsedJson = JSON.parse(text);
          if (Array.isArray(parsedJson)) {
            return parsedJson;
          }
        } catch (errorA) {
          // keep trying
        }

        try {
          var decoded = atob(text);
          var parsedBase64 = JSON.parse(decoded);
          if (Array.isArray(parsedBase64)) {
            return parsedBase64;
          }
        } catch (errorB) {
          // keep trying
        }

        var delimiter = ",";
        if (text.indexOf("|") > -1) {
          delimiter = "|";
        } else if (text.indexOf(";") > -1) {
          delimiter = ";";
        }

        return text.split(delimiter);
      }

      function readTextList(params, keys) {
        var raw = getFirstParamValue(params, keys);
        if (raw === null || raw === undefined) {
          return [];
        }

        return parseList(raw)
          .map(function (item) {
            return normalizeText(item, "");
          })
          .filter(function (item) {
            return item.length > 0;
          });
      }

      function readNumberList(params, keys) {
        var raw = getFirstParamValue(params, keys);
        if (raw === null || raw === undefined) {
          return [];
        }

        var values = parseList(raw);
        var output = [];
        for (var i = 0; i < values.length; i += 1) {
          var n = toSafeNumber(values[i], Number.NaN);
          if (!Number.isFinite(n)) {
            continue;
          }
          output.push(n);
        }
        return output;
      }

      function toBinaryEvent(value) {
        var n = toSafeNumber(value, Number.NaN);
        return Number.isFinite(n) && n > 0 ? 1 : 0;
      }

      function makeSeededRandom(seed) {
        var state = seed % 2147483647;
        if (state <= 0) {
          state += 2147483646;
        }
        return function () {
          state = state * 16807 % 2147483647;
          return (state - 1) / 2147483646;
        };
      }

      function readNumberParam(params, keys, fallback) {
        return toSafeNumber(getFirstParamValue(params, keys), fallback);
      }

      function normalizeSexoFilter(value) {
        var key = normalizeText(value, "all").toLowerCase();
        if (key === "m" || key === "masculino" || key === "male" || key === "hombre") {
          return "M";
        }
        if (key === "f" || key === "femenino" || key === "female" || key === "mujer") {
          return "F";
        }
        return "ALL";
      }

      // Hardcoded synthetic table (fixed cohort) for demo without backend.
      // Structure aligned with KM inputs: cic, meses_supervivencia, exitus_corte
      // plus helper dimensions for filtering: sexo, edad.
      function buildHardcodedSyntheticTable5000() {
        var rng = makeSeededRandom(20260225);
        var total = 5000;
        var rows = [];

        // Calibrated synthetic profile (deterministic) based on provided CSV schema
        // and tuned to realistic KM demo behaviour.
        var ageRanges = [
          { min: 30, max: 49 },
          { min: 50, max: 59 },
          { min: 60, max: 69 },
          { min: 70, max: 79 },
          { min: 80, max: 90 }
        ];
        var ageBucketProb = [0.038, 0.172, 0.41, 0.317, 0.063];
        var maleProbByBucket = [0.66, 0.588, 0.593, 0.73, 0.7];
        var eventProbMale = [0.54, 0.62, 0.70, 0.80, 0.86];
        var eventProbFemale = [0.44, 0.53, 0.62, 0.74, 0.80];
        var scaleMale = [24, 21, 18, 15, 13];
        var scaleFemale = [27, 23, 20, 16, 14];
        var weibullShape = 1.1;

        function pickIndex(probabilities) {
          var r = rng();
          var cum = 0;
          for (var p = 0; p < probabilities.length; p += 1) {
            cum += probabilities[p];
            if (r <= cum) {
              return p;
            }
          }
          return probabilities.length - 1;
        }

        for (var i = 0; i < total; i += 1) {
          var bucket = pickIndex(ageBucketProb);
          var range = ageRanges[bucket];
          var edad = Math.floor(range.min + rng() * (range.max - range.min + 1));
          var sexo = rng() < maleProbByBucket[bucket] ? "M" : "F";
          var eventProb = sexo === "M" ? eventProbMale[bucket] : eventProbFemale[bucket];
          var evento = rng() < eventProb ? 1 : 0;
          var meses = 1;

          if (evento === 1) {
            var scale = sexo === "M" ? scaleMale[bucket] : scaleFemale[bucket];
            var u = rng();
            meses = Math.ceil(scale * Math.pow(-Math.log(1 - u), 1 / weibullShape));
          } else {
            // Censored cases usually carry longer follow-up.
            meses = Math.ceil(10 + (60 - 10) * Math.pow(rng(), 0.35));
          }

          if (meses < 1) {
            meses = 1;
          } else if (meses > 60) {
            meses = 60;
          }

          var cic = "demo_" + String(i + 1);
          var codigopaciente = 100000 + i;

          rows.push({
            codigopaciente: codigopaciente,
            cic: cic,
            sexo: sexo,
            edad: edad,
            meses_supervivencia: meses,
            exitus_corte: evento
          });
        }

        return rows;
      }

      var HARD_CODED_SYNTHETIC_TABLE_5000 = buildHardcodedSyntheticTable5000();
      window.HARD_CODED_SYNTHETIC_TABLE_5000 = HARD_CODED_SYNTHETIC_TABLE_5000;

      function getDemoFilteredRows(params) {
        var data = HARD_CODED_SYNTHETIC_TABLE_5000;
        var sexoFilter = normalizeSexoFilter(getFirstParamValue(params, ["sexo", "filtrosexo"]));
        var edadMin = readNumberParam(params, ["edadmin", "edad_min"], 0);
        var edadMax = readNumberParam(params, ["edadmax", "edad_max"], 120);

        if (edadMin > edadMax) {
          var tmp = edadMin;
          edadMin = edadMax;
          edadMax = tmp;
        }

        var filtered = [];
        for (var i = 0; i < data.length; i += 1) {
          var row = data[i];
          if (sexoFilter !== "ALL" && row.sexo !== sexoFilter) {
            continue;
          }
          if (row.edad < edadMin || row.edad > edadMax) {
            continue;
          }
          filtered.push({
            cic: row.cic,
            meses: row.meses_supervivencia,
            evento: row.exitus_corte
          });
        }

        return filtered;
      }

      function readRawRowsFromJson(params) {
        var raw = getFirstParamValue(params, ["kmrows", "kmjson", "datoskm", "rowsjson"]);
        if (raw === null || raw === undefined) {
          return [];
        }

        var parsed = parseList(raw);
        if (!parsed.length || typeof parsed[0] !== "object") {
          return [];
        }

        var rows = [];
        for (var i = 0; i < parsed.length; i += 1) {
          var current = parsed[i];
          if (!current || typeof current !== "object") {
            continue;
          }

          var cic = normalizeText(
            current.cic || current.CIC || current.codigopaciente || current.CODIGOPACIENTE || ("p" + String(i + 1)),
            "p" + String(i + 1)
          );
          var mesesRaw = current.mesessupervivencia || current.meses_supervivencia || current.MESES_SUPERVIVENCIA;
          var eventoRaw = current.exituscorte || current.exitus_corte || current.EXITUS_CORTE;
          var meses = toSafeNumber(mesesRaw, Number.NaN);

          if (!Number.isFinite(meses) || meses < 0) {
            continue;
          }

          rows.push({
            cic: cic,
            meses: meses,
            evento: toBinaryEvent(eventoRaw)
          });
        }

        return rows;
      }

      function readRawRowsFromColumns(params) {
        var cicList = readTextList(params, ["kmcic", "datoscic", "cic"]);
        var mesesList = readNumberList(params, ["kmmeses", "datoskmmeses", "mesessupervivencia"]);
        var eventoList = readTextList(params, ["kmevento", "datoskmevento", "exituscorte"]);

        var size = Math.max(cicList.length, mesesList.length, eventoList.length);
        if (size < 1) {
          return [];
        }

        var rows = [];
        for (var i = 0; i < size; i += 1) {
          var meses = toSafeNumber(mesesList[i], Number.NaN);
          if (!Number.isFinite(meses) || meses < 0) {
            continue;
          }

          rows.push({
            cic: normalizeText(cicList[i], "p" + String(i + 1)),
            meses: meses,
            evento: toBinaryEvent(eventoList[i])
          });
        }

        return rows;
      }

      function collapseRowsByPatient(rows) {
        var map = {};
        for (var i = 0; i < rows.length; i += 1) {
          var row = rows[i];
          var key = normalizeText(row.cic, "p" + String(i + 1));

          if (!map[key]) {
            map[key] = {
              cic: key,
              meses: row.meses,
              evento: row.evento
            };
            continue;
          }

          if (row.meses > map[key].meses) {
            map[key].meses = row.meses;
          }
          if (row.evento > map[key].evento) {
            map[key].evento = row.evento;
          }
        }

        var patients = [];
        var keys = Object.keys(map);
        for (var j = 0; j < keys.length; j += 1) {
          patients.push(map[keys[j]]);
        }
        return patients;
      }

      function computeMedian(points) {
        for (var i = 0; i < points.length; i += 1) {
          if (points[i].y <= 0.5) {
            return points[i].x;
          }
        }
        return null;
      }

      function getSurvivalAtMonth(points, month) {
        var value = 1;
        for (var i = 0; i < points.length; i += 1) {
          if (points[i].x <= month) {
            value = points[i].y;
          } else {
            break;
          }
        }
        return value;
      }

      function buildRiskTable(points, timeline, totalPatients, patients) {
        var maxObserved = 0;
        for (var i = 0; i < points.length; i += 1) {
          if (points[i].x > maxObserved) {
            maxObserved = points[i].x;
          }
        }
        var maxMonth = Math.max(60, Math.ceil(maxObserved / 6) * 6);
        var ticks = [];
        for (var t = 0; t <= maxMonth; t += 6) {
          ticks.push(t);
        }

        var atRisk = [];
        var events = [];
        var censored = [];
        var survival = [];

        // Preferred mode (demo/raw rows): interval table like the reference visual.
        if (Array.isArray(patients) && patients.length) {
          for (var p = 0; p < ticks.length; p += 1) {
            var tickStart = ticks[p];
            var tickEnd = tickStart + 6;
            var atRiskCount = 0;
            var eventsCount = 0;
            var censCount = 0;

            for (var r = 0; r < patients.length; r += 1) {
              var row = patients[r];
              if (!Number.isFinite(row.meses)) {
                continue;
              }

              if (row.meses >= tickStart) {
                atRiskCount += 1;
              }

              if (row.meses >= tickStart && row.meses < tickEnd) {
                if (row.evento === 1) {
                  eventsCount += 1;
                } else {
                  censCount += 1;
                }
              }
            }

            atRisk.push(atRiskCount);
            events.push(eventsCount);
            censored.push(censCount);
            survival.push(getSurvivalAtMonth(points, tickStart));
          }

          return {
            ticks: ticks,
            atRisk: atRisk,
            events: events,
            censored: censored,
            survival: survival
          };
        }

        // Fallback mode (precomputed curves): infer a simplified table from timeline.
        for (var k = 0; k < ticks.length; k += 1) {
          var tick = ticks[k];
          var state = {
            atRisk: totalPatients,
            events: 0,
            censored: 0,
            survival: getSurvivalAtMonth(points, tick)
          };

          for (var j = 0; j < timeline.length; j += 1) {
            if (timeline[j].time <= tick) {
              state.atRisk = timeline[j].atRisk;
              state.events = timeline[j].eventsCum;
              state.censored = timeline[j].censoredCum;
              state.survival = timeline[j].survival;
            } else {
              break;
            }
          }

          atRisk.push(state.atRisk);
          events.push(state.events);
          censored.push(state.censored);
          survival.push(state.survival);
        }

        return {
          ticks: ticks,
          atRisk: atRisk,
          events: events,
          censored: censored,
          survival: survival
        };
      }

      function computeKaplanMeierFromPatients(patients) {
        if (!patients.length) {
          return null;
        }

        var totalEvents = 0;
        var totalCensored = 0;
        var byTime = {};
        for (var i = 0; i < patients.length; i += 1) {
          var t = patients[i].meses;
          var tKey = String(t);
          if (!byTime[tKey]) {
            byTime[tKey] = { events: 0, censored: 0, time: t };
          }
          if (patients[i].evento === 1) {
            byTime[tKey].events += 1;
            totalEvents += 1;
          } else {
            byTime[tKey].censored += 1;
            totalCensored += 1;
          }
        }

        var orderedTimes = Object.keys(byTime)
          .map(function (key) {
            return byTime[key].time;
          })
          .sort(function (a, b) {
            return a - b;
          });

        var nAtRisk = patients.length;
        var surv = 1;
        var points = [{ x: 0, y: 1 }];
        var timeline = [];
        var cumulativeEvents = 0;
        var cumulativeCensored = 0;

        for (var j = 0; j < orderedTimes.length; j += 1) {
          var time = orderedTimes[j];
          var bucket = byTime[String(time)];
          var d = bucket.events;
          var c = bucket.censored;
          var atRiskBefore = nAtRisk;
          cumulativeEvents += d;
          cumulativeCensored += c;

          if (nAtRisk > 0 && d > 0) {
            surv = surv * (1 - d / nAtRisk);
          }

          points.push({ x: time, y: surv });
          timeline.push({
            time: time,
            atRisk: atRiskBefore,
            eventsCum: cumulativeEvents,
            censoredCum: cumulativeCensored,
            survival: surv
          });
          nAtRisk -= (d + c);
          if (nAtRisk < 0) {
            nAtRisk = 0;
          }
        }

        var risk = buildRiskTable(points, timeline, patients.length, patients);

        return {
          points: points,
          timeline: timeline,
          risk: risk,
          totalPatients: patients.length,
          totalEvents: totalEvents,
          totalCensored: totalCensored,
          median: computeMedian(points),
          surv12: getSurvivalAtMonth(points, 12),
          surv24: getSurvivalAtMonth(points, 24)
        };
      }

      function readPrecomputedCurve(params) {
        var times = readNumberList(params, ["kmtiempo", "tiempokm"]);
        var surv = readNumberList(params, ["kmsupervivencia", "kmsurv", "supervivenciakm"]);

        var size = Math.min(times.length, surv.length);
        if (size < 2) {
          return DEFAULT_CURVE;
        }

        var pairs = [];
        for (var i = 0; i < size; i += 1) {
          var t = toSafeNumber(times[i], Number.NaN);
          var s = toSafeNumber(surv[i], Number.NaN);
          if (!Number.isFinite(t) || !Number.isFinite(s)) {
            continue;
          }
          if (t < 0) {
            continue;
          }
          if (s < 0) {
            s = 0;
          }
          if (s > 1) {
            s = 1;
          }
          pairs.push({ x: t, y: s });
        }

        if (pairs.length < 2) {
          return DEFAULT_CURVE;
        }

        pairs.sort(function (a, b) {
          return a.x - b.x;
        });

        if (pairs[0].x > 0) {
          pairs.unshift({ x: 0, y: 1 });
        }

        var totalPatients = toSafeNumber(getFirstParamValue(params, ["kmtotalpacientes", "kmtotal"]), 0);
        var totalEvents = toSafeNumber(getFirstParamValue(params, ["kmtotaleventos", "kmeventos"]), 0);
        var totalCensored = toSafeNumber(getFirstParamValue(params, ["kmtotalcensurados", "kmcensurados"]), 0);
        if (!Number.isFinite(totalCensored) || totalCensored <= 0) {
          totalCensored = Math.max(0, totalPatients - totalEvents);
        }
        var risk = buildRiskTable(pairs, [], totalPatients);

        return {
          points: pairs,
          timeline: [],
          risk: risk,
          totalPatients: totalPatients,
          totalEvents: totalEvents,
          totalCensored: totalCensored,
          median: computeMedian(pairs),
          surv12: getSurvivalAtMonth(pairs, 12),
          surv24: getSurvivalAtMonth(pairs, 24)
        };
      }

      // Render switching logic:
      // - If raw rows arrive in URL, curve is computed inside the visual.
      // - If not, visual always uses the hardcoded synthetic cohort filtered by sexo/edadmin/edadmax.
      // - Precomputed curve params are only a fallback if synthetic filtering returns no rows.
      function buildConfigFromQuery(params) {
        var rawRows = readRawRowsFromJson(params);
        if (!rawRows.length) {
          rawRows = readRawRowsFromColumns(params);
        }

        if (rawRows.length) {
          var patients = collapseRowsByPatient(rawRows);
          var computed = computeKaplanMeierFromPatients(patients);
          if (computed) {
            return computed;
          }
        }

        var demoRows = getDemoFilteredRows(params);
        var demoPatients = collapseRowsByPatient(demoRows);
        var demoComputed = computeKaplanMeierFromPatients(demoPatients);
        if (demoComputed) {
          return demoComputed;
        }

        return readPrecomputedCurve(params);
      }

      function formatInteger(value) {
        return new Intl.NumberFormat("es-ES", { maximumFractionDigits: 0 }).format(value);
      }

      function formatMedian(value) {
        if (!Number.isFinite(value)) {
          return "--";
        }
        return new Intl.NumberFormat("es-ES", {
          minimumFractionDigits: value % 1 === 0 ? 0 : 1,
          maximumFractionDigits: 2
        }).format(value);
      }

      function formatPercent(value, decimals) {
        if (!Number.isFinite(value)) {
          return "--";
        }
        var digits = Number.isFinite(decimals) ? decimals : 1;
        return new Intl.NumberFormat("es-ES", {
          minimumFractionDigits: digits,
          maximumFractionDigits: digits
        }).format(value * 100) + "%";
      }

      function normalizeCurveConfig(config) {
        var safe = config || {};
        if (!Array.isArray(safe.points) || safe.points.length < 2) {
          safe.points = DEFAULT_CURVE.points.slice();
        }
        if (!Number.isFinite(safe.totalPatients)) {
          safe.totalPatients = 0;
        }
        if (!Number.isFinite(safe.totalEvents)) {
          safe.totalEvents = 0;
        }
        if (!Number.isFinite(safe.totalCensored)) {
          safe.totalCensored = Math.max(0, safe.totalPatients - safe.totalEvents);
        }
        if (!Number.isFinite(safe.median)) {
          safe.median = computeMedian(safe.points);
        }
        if (!Number.isFinite(safe.surv12)) {
          safe.surv12 = getSurvivalAtMonth(safe.points, 12);
        }
        if (!Number.isFinite(safe.surv24)) {
          safe.surv24 = getSurvivalAtMonth(safe.points, 24);
        }
        if (!safe.risk || !Array.isArray(safe.risk.ticks)) {
          safe.risk = buildRiskTable(safe.points, safe.timeline || [], safe.totalPatients || 0);
        }
        return safe;
      }

      function renderRiskTable(config) {
        if (!dom.riskTable) {
          return;
        }

        var risk = config.risk || {
          ticks: [],
          atRisk: [],
          events: [],
          censored: [],
          survival: []
        };

        var header = "<thead><tr><th>Mes</th>";
        for (var h = 0; h < risk.ticks.length; h += 1) {
          header += "<th>" + formatInteger(risk.ticks[h]) + "</th>";
        }
        header += "</tr></thead>";

        function buildDataRow(label, values, formatter) {
          var row = "<tr><td class=\"row-label\">" + label + "</td>";
          for (var i = 0; i < risk.ticks.length; i += 1) {
            var v = values[i];
            row += "<td>" + formatter(v) + "</td>";
          }
          row += "</tr>";
          return row;
        }

        function intOrDash(value) {
          return Number.isFinite(value) ? formatInteger(value) : "--";
        }

        function survOrDash(value) {
          return Number.isFinite(value) ? formatPercent(value, 0) : "--";
        }

        var body = "<tbody>";
        body += buildDataRow("En riesgo", risk.atRisk || [], intOrDash);
        body += buildDataRow("Eventos", risk.events || [], intOrDash);
        body += buildDataRow("Censurados", risk.censored || [], intOrDash);
        body += buildDataRow("Supervivencia", risk.survival || [], survOrDash);
        body += "</tbody>";

        dom.riskTable.innerHTML = header + body;
      }

      function setMeta(config) {
        dom.pacientes.textContent = formatInteger(config.totalPatients || 0);
        dom.eventos.textContent = formatInteger(config.totalEvents || 0);
        dom.mediana.textContent = Number.isFinite(config.median) ? (formatMedian(config.median) + "m") : "--";
        dom.surv12.textContent = formatPercent(config.surv12, 1);
        dom.surv24.textContent = formatPercent(config.surv24, 1);
      }

      function showError(message) {
        dom.error.textContent = message;
        dom.error.style.display = "block";
      }

      function clearError() {
        dom.error.textContent = "";
        dom.error.style.display = "none";
      }

      function registerPlugins() {
        if (pluginRegistered || !window.Chart) {
          return;
        }

        window.Chart.register({
          id: "medianGuides",
          afterDatasetsDraw: function (chart, args, pluginOptions) {
            if (!pluginOptions || !Number.isFinite(pluginOptions.median)) {
              return;
            }

            var xScale = chart.scales.x;
            var yScale = chart.scales.y;
            if (!xScale || !yScale) {
              return;
            }

            var xMed = xScale.getPixelForValue(pluginOptions.median);
            var yHalf = yScale.getPixelForValue(0.5);
            var yBottom = yScale.getPixelForValue(0);
            var xZero = xScale.getPixelForValue(0);
            var ctx = chart.ctx;
            var rootStyles = getComputedStyle(document.documentElement);
            var medianColor = rootStyles.getPropertyValue("--color-warning").trim() || "#F57C00";

            ctx.save();
            ctx.strokeStyle = medianColor;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);

            ctx.beginPath();
            ctx.moveTo(xZero, yHalf);
            ctx.lineTo(xMed, yHalf);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(xMed, yBottom);
            ctx.lineTo(xMed, yHalf);
            ctx.stroke();

            ctx.setLineDash([]);
            ctx.fillStyle = medianColor;
            ctx.font = "600 11px Amazon Ember, Segoe UI, Arial, sans-serif";
            ctx.textAlign = "left";
            ctx.textBaseline = "bottom";
            ctx.fillText("Mediana: " + formatMedian(pluginOptions.median) + "m", xMed + 6, yHalf - 4);
            ctx.restore();
          }
        });

        pluginRegistered = true;
      }

      async function ensureChartJs() {
        if (window.Chart) {
          return;
        }

        await new Promise(function (resolve, reject) {
          var script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js";
          script.async = true;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      async function ensurePyodideRuntime() {
        if (pyodideInstance) {
          return pyodideInstance;
        }
        if (pyodideBootPromise) {
          return pyodideBootPromise;
        }

        pyodideBootPromise = new Promise(function (resolve, reject) {
          if (window.loadPyodide) {
            resolve();
            return;
          }
          var script = document.createElement("script");
          script.src = "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js";
          script.async = true;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        }).then(async function () {
          pyodideInstance = await window.loadPyodide({
            indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.2/full/"
          });
          return pyodideInstance;
        });

        return pyodideBootPromise;
      }

      async function ensureEmbeddedPythonLoaded() {
        var py = await ensurePyodideRuntime();
        if (pythonKernelReady) {
          return py;
        }
        var codeNode = document.getElementById("kaplan-meier-python-embedded");
        if (!codeNode || !codeNode.textContent) {
          throw new Error("No se encontro el bloque Python embebido.");
        }
        py.runPython(codeNode.textContent);
        pythonKernelReady = true;
        return py;
      }

      async function computeConfigWithEmbeddedPython(rawRows, precomputed) {
        var py = await ensureEmbeddedPythonLoaded();
        py.globals.set("km_input_rows", rawRows || []);
        py.globals.set("km_input_precomputed", precomputed || {});

        try {
          var resultJson = py.runPython(
            "compute_km_visual_json(km_input_rows, km_input_precomputed)"
          );
          return JSON.parse(String(resultJson));
        } finally {
          py.globals.set("km_input_rows", null);
          py.globals.set("km_input_precomputed", null);
        }
      }

      async function buildConfigFromQueryUsingPython(params) {
        var rawRows = readRawRowsFromJson(params);
        if (!rawRows.length) {
          rawRows = readRawRowsFromColumns(params);
        }
        if (!rawRows.length) {
          rawRows = getDemoFilteredRows(params);
        }

        var precomputedCurve = readPrecomputedCurve(params);
        var precomputedPayload = {
          points: precomputedCurve.points || [],
          totalPatients: precomputedCurve.totalPatients || 0,
          totalEvents: precomputedCurve.totalEvents || 0,
          totalCensored: precomputedCurve.totalCensored || 0
        };

        return computeConfigWithEmbeddedPython(rawRows, precomputedPayload);
      }

      function destroyChart() {
        if (chartInstance) {
          chartInstance.destroy();
          chartInstance = null;
        }
      }

      function renderCurve(config) {
        destroyChart();
        clearError();

        if (!config.points || config.points.length < 2) {
          showError("No hay datos validos para dibujar la curva.");
          return;
        }

        var maxX = 60;
        if (config.risk && Array.isArray(config.risk.ticks) && config.risk.ticks.length) {
          maxX = config.risk.ticks[config.risk.ticks.length - 1];
        }
        var rootStyles = getComputedStyle(document.documentElement);
        var curveColor = rootStyles.getPropertyValue("--color-secondary-analytic").trim() || "#343087";
        var axisTitleColor = rootStyles.getPropertyValue("--color-primary").trim() || "#2E2A78";
        var axisTickColor = rootStyles.getPropertyValue("--color-text-secondary").trim() || "#6E6E6E";
        var gridColor = rootStyles.getPropertyValue("--color-grid").trim() || "#D8D2C8";

        chartInstance = new window.Chart(dom.canvas, {
          type: "line",
          data: {
            datasets: [
              {
                label: "S(t)",
                data: config.points,
                borderColor: curveColor,
                backgroundColor: curveColor,
                borderWidth: 3,
                pointRadius: 0,
                pointHoverRadius: 4,
                stepped: "after",
                tension: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            parsing: true,
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                callbacks: {
                  title: function (items) {
                    return "Meses: " + formatMedian(items[0].parsed.x);
                  },
                  label: function (context) {
                    return "Supervivencia: " + formatPercent(context.parsed.y, 1);
                  }
                }
              },
              medianGuides: {
                median: config.median
              }
            },
            scales: {
              x: {
                type: "linear",
                min: 0,
                max: maxX,
                title: {
                  display: true,
                  text: "Meses",
                  color: axisTitleColor,
                  font: {
                    family: "Amazon Ember, Segoe UI, Arial, sans-serif",
                    weight: "700"
                  }
                },
                ticks: {
                  color: axisTickColor,
                  stepSize: 10
                },
                grid: {
                  color: gridColor,
                  borderDash: [2, 4]
                }
              },
              y: {
                min: 0,
                max: 1,
                title: {
                  display: true,
                  text: "Supervivencia",
                  color: axisTitleColor,
                  font: {
                    family: "Amazon Ember, Segoe UI, Arial, sans-serif",
                    weight: "700"
                  }
                },
                ticks: {
                  color: axisTickColor,
                  callback: function (value) {
                    return String(Math.round(Number(value) * 100)) + "%";
                  }
                },
                grid: {
                  color: gridColor,
                  borderDash: [2, 4]
                }
              }
            }
          }
        });
      }

      async function init() {
        var params = readQueryParams();
        var config = null;

        try {
          config = normalizeCurveConfig(await buildConfigFromQueryUsingPython(params));
        } catch (pythonError) {
          config = normalizeCurveConfig(buildConfigFromQuery(params));
        }

        setMeta(config);
        renderRiskTable(config);

        try {
          await ensureChartJs();
          registerPlugins();
          renderCurve(config);
        } catch (error) {
          showError("No se pudo cargar Chart.js desde CDN.");
        }
}

      init();
    })();
  </script>
</body>
</html>
